<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FakeAcademy</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Assignment navigation">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">FA</span>
          <div>
            <strong>FakeAcademy</strong>
            <span>Project-first coding practice</span>
          </div>
        </div>

        <div class="track-summary">
          <span>Foundations Track</span>
          <strong id="track-count">0 projects</strong>
        </div>

        <nav class="assignment-list" id="assignment-list"></nav>
      </aside>

      <main class="workspace">
        <section class="brief-panel" aria-labelledby="assignment-title">
          <div class="brief-header">
            <div>
              <p class="eyebrow" id="assignment-path">Foundations</p>
              <h1 id="assignment-title"></h1>
            </div>
            <div class="status-pill" id="assignment-level"></div>
          </div>

          <p class="summary" id="assignment-summary"></p>

          <div class="project-meta" id="project-meta"></div>

          <div class="tabs" role="tablist" aria-label="Assignment details">
            <button class="tab is-active" type="button" data-tab="instructions">Instructions</button>
            <button class="tab" type="button" data-tab="files">Files</button>
            <button class="tab" type="button" data-tab="rubric">Rubric</button>
          </div>

          <div class="tab-panel" id="tab-panel"></div>
        </section>

        <section class="editor-panel" aria-label="Code workspace">
          <div class="editor-toolbar">
            <div>
              <span id="active-file"></span>
              <strong id="editor-title">Skeleton file</strong>
            </div>
            <div class="toolbar-actions">
              <button class="ghost-button" type="button" id="reset-code">Reset</button>
              <button class="primary-button" type="button" id="run-tests">Run checks</button>
            </div>
          </div>

          <textarea id="code-editor" spellcheck="false" aria-label="Code editor"></textarea>

          <div class="results-panel" aria-live="polite">
            <div class="results-header">
              <strong>Check results</strong>
              <span id="result-summary">Run the checks when your implementation is ready.</span>
            </div>
            <div class="result-list" id="result-list"></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
